<div class="p-4 flex flex-col items-center border bg-white w-full rounded">
    <h2 class="counter mb-4">{{ tasks().length }} things I have to do.</h2>

    @if (tasks().length === 0) {

    <p>No tasks found</p>

    } @else {
    <ul class="flex flex-col justify-center gap-4 p-2" id="todoList">
        @for (task of tasks(); track task.id) {
        <app-task-list-item [task]="task" (updateTask)="updateTask($event)"></app-task-list-item>
        }
    </ul>
    }
</div>
