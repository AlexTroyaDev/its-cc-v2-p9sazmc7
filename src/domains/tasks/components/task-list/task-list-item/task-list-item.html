<li class="flex">
    <label [for]="'task-status-' + task().id">
        {{task().title}}
        <app-severity-item-button [severity]="task().severity"></app-severity-item-button>
        <input type="checkbox" [id]="'task-status-' + task().id" [checked]="task().status === TaskStatus.DONE" />
    </label>
</li>
